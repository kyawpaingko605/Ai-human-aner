name: Build Flutter Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4 # v3 မှ v4 သို့ မြှင့်တင်ထားသည်

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # v3 မှ v4 သို့ မြှင့်တင်ထားသည်
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Get Flutter Packages
      run: flutter pub get

    - name: Build Release APK
      run: flutter build apk --release --no-tree-shake-icons

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4 # v3 မှ v4 သို့ မြှင့်တင်ထားသည် (ဒီနေရာက အဓိက အမှားပြင်ဆင်ချက်ပါ)
      with:
        name: Burmese-AI-Brain-APK
        path: build/app/outputs/flutter-apk/app-release.apk
