name: Build Flutter Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4 # ၎င်းကိုလည်း နောက်ဆုံးဗားရှင်း v4 ပြောင်းထားသည်

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # v4 သို့ ပြောင်းထားသည်
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: Get Flutter Packages
      run: flutter pub get

    - name: Build Release APK
      run: flutter build apk --release --no-tree-shake-icons

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4 # 🌟 ဒီနေရာကို v4 ပြောင်းလိုက်တာဖြစ်လို့ Error ရှင်းသွားပါလိမ့်မယ်
      with:
        name: Burmese-AI-Brain-APK
        path: build/app/outputs/flutter-apk/app-release.apk
